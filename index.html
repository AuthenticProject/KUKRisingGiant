<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUK HR Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="description" content="Portal HR KUK - Absensi, Cuti, dan Pelanggaran Karyawan">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --primary: #3b82f6;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand { text-align: center; }

    .brand-logo {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
      font-size: 36px;
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding: 0 2px;
      display: block;
    }

    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 18px 18px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1),
                  box-shadow 0.22s cubic-bezier(0.4,0,0.2,1),
                  border-color 0.22s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .menu-card:active { transform: scale(0.97); }

    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent, rgba(255,255,255,0.18));
      box-shadow: 0 16px 40px rgba(0,0,0,0.35),
                  0 0 0 1px var(--accent, transparent);
    }

    .menu-card.blue  { --accent: #3b82f6; }
    .menu-card.green { --accent: #10b981; }
    .menu-card.amber { --accent: #f59e0b; }
    .menu-card.red   { --accent: #ef4444; }

    .menu-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.2s;
    }

    .menu-card:hover .menu-icon { transform: scale(1.1); }

    .menu-card.blue  .menu-icon { background: rgba(59,130,246,0.18); }
    .menu-card.green .menu-icon { background: rgba(16,185,129,0.18); }
    .menu-card.amber .menu-icon { background: rgba(245,158,11,0.18); }
    .menu-card.red   .menu-icon { background: rgba(239,68,68,0.18); }

    .menu-card-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .menu-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-top: -4px;
    }

    /* Arrow indicator */
    .menu-arrow {
      position: absolute;
      right: 14px; bottom: 14px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateX(-6px);
    }
    .menu-card:hover .menu-arrow {
      opacity: 0.6;
      transform: translateX(0);
    }

    /* Full-width card (for dashboard) */
    .menu-card.full {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      padding: 18px 20px;
      gap: 16px;
    }
    .menu-card.full .menu-info { flex: 1; }
    .menu-card.full .menu-arrow {
      position: static;
      opacity: 0.4;
      transform: none;
    }
    .menu-card.full:hover .menu-arrow {
      opacity: 0.8;
      transform: translateX(4px);
    }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #475569;
      padding-top: 8px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">🏪</div>
      <h1>KUK HR Portal</h1>
      <p>Sistem Manajemen Karyawan</p>
    </div>

    <!-- Menu -->
    <div>
      <span class="section-label">Pilih Menu</span>
      <div class="menu-grid">

        <!-- Absen Briefing -->
        <a href="absen.html" class="menu-card blue">
          <div class="menu-icon">📋</div>
          <div class="menu-card-label">Rekap Absen</div>
          <div class="menu-card-desc">Briefing pagi harian</div>
          <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </a>

        <!-- Cuti -->
        <a href="cuti.html" class="menu-card green">
          <div class="menu-icon">🏖️</div>
          <div class="menu-card-label">Pengajuan Cuti</div>
          <div class="menu-card-desc">Pilih jadwal libur</div>
          <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </a>

        <!-- Pelanggaran -->
        <a href="pelanggaran.html" class="menu-card amber">
          <div class="menu-icon">⚠️</div>
          <div class="menu-card-label">Pelanggaran</div>
          <div class="menu-card-desc">Catat pelanggaran</div>
          <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </a>

        <!-- Dashboard Admin (full width) -->
        <a href="dashboard/" class="menu-card red full">
          <div class="menu-icon">📊</div>
          <div class="menu-info">
            <div class="menu-card-label">Dashboard Admin</div>
            <div class="menu-card-desc">Rekap data & laporan — login staf</div>
          </div>
          <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </a>

      </div>
    </div>

    <div class="footer-note">KUK &copy; 2025 &mdash; Internal Use Only</div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered', reg.scope))
          .catch(err => console.error('SW failed', err));
      });
    }
  </script>
</body>
</html>
