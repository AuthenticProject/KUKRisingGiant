<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Briefing Pagi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --success-light: #ecfdf5;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --warning: #f59e0b;
      --warning-light: #fffbeb;
      --info: #0ea5e9;
      --info-light: #e0f2fe;
      --radius: 16px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 20px 120px;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .date-display {
      text-align: center;
      font-size: 18px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 5px;
    }

    .clock-display {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Table Styles */
    .table-responsive {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .employee-name {
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .employee-div {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Segmented Control for Attendance Status */
    .status-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .status-option {
      position: relative;
    }

    .status-option input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .status-label {
      display: inline-block;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: 0.2s;
      background: var(--surface);
    }

    .status-option:hover .status-label {
      background: #f8fafc;
    }

    /* Checked States */
    .status-option input[value="Hadir"]:checked~.status-label {
      background: var(--success-light);
      color: var(--success);
      border-color: var(--success);
    }

    .status-option input[value="Ghoib"]:checked~.status-label {
      background: var(--danger-light);
      color: var(--danger);
      border-color: var(--danger);
    }

    .status-option input[value="Sakit"]:checked~.status-label {
      background: var(--warning-light);
      color: var(--warning);
      border-color: var(--warning);
    }

    .status-option input[value="Izin"]:checked~.status-label {
      background: var(--info-light);
      color: var(--info);
      border-color: var(--info);
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      border-top: 1px solid var(--border);
      z-index: 100;
    }

    .btn-submit {
      width: 100%;
      max-width: 500px;
      padding: 16px;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-submit:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      display: none;
    }

    .btn-submit.loading .spinner {
      display: block;
    }

    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: white;
      color: var(--text);
      padding: 14px 24px;
      border-radius: 100px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      font-weight: 500;
      font-size: 14px;
      border-left: 4px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto;
    }

    .toast.success {
      border-left-color: var(--success);
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes toastIn {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      to {
        transform: translateY(-20px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="toast-container" id="toastContainer"></div>

  <div class="app-container">
    <div class="header">
      <h1>Rekap Briefing Pagi</h1>
      <p>Catat kehadiran semua karyawan untuk briefing hari ini.</p>
    </div>

    <div class="card">
      <div class="date-display" id="dateDisplay">Memuat tanggal...</div>
      <div class="clock-display" id="clockDisplay">00:00:00</div>
    </div>

    <div class="card" style="padding: 0;">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Nama Karyawan & Bagian</th>
              <th>Status Kehadiran</th>
            </tr>
          </thead>
          <tbody id="karyawanList">
            <tr>
              <td colspan="2" style="text-align: center; padding: 40px;">
                <div class="spinner" style="display: inline-block; border-top-color: var(--primary);"></div>
                <div style="margin-top: 10px; color: var(--text-muted);">Memuat daftar karyawan...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="text-align: center; margin-top: 10px;">
      <a href="index.html" style="color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600;">←
        Kembali ke Portal Utama</a>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn-submit" id="submitBtn" onclick="handleAbsen()">
      <span class="spinner"></span>
      <span id="btnText">Simpan Rekap Absen</span>
    </button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyImXw0aoSGbCOBQQwASBou_k_BOBrtt7xFdLP4ZnYcJAsPxcShvkBJKqGr-ob1T-gb/exec";
    let dbKaryawan = [];

    // Clock
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\./g, ':');
      document.getElementById('clockDisplay').textContent = timeStr;

      const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('id-ID', dateOptions);
    }
    setInterval(updateClock, 1000);
    updateClock();

    function showToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = type === 'success'
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> ${msg}`;
      container.appendChild(t);
      setTimeout(() => { t.style.animation = 'toastOut 0.3s forwards'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    function init() {
      fetch(`${SCRIPT_URL}?action=init`)
        .then(r => r.json())
        .then(res => {
          dbKaryawan = res.karyawan || [];
          renderKaryawanList();
        }).catch(e => {
          document.getElementById('karyawanList').innerHTML = '<tr><td colspan="2" style="text-align:center; color:red;">Gagal memuat data server.</td></tr>';
          showToast('Gagal memuat data server.', 'error');
        });
    }

    function renderKaryawanList() {
      const tbody = document.getElementById('karyawanList');
      if (dbKaryawan.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Data karyawan kosong.</td></tr>';
        return;
      }

      tbody.innerHTML = dbKaryawan.map(k => `
        <tr>
          <td>
            <span class="employee-name">${k.nama}</span>
            <span class="employee-div">${k.bagian || '-'}</span>
          </td>
          <td>
            <div class="status-group">
              <label class="status-option">
                <input type="radio" name="status_${k.id}" value="Hadir" checked>
                <span class="status-label">Hadir</span>
              </label>
              <label class="status-option">
                <input type="radio" name="status_${k.id}" value="Ghoib">
                <span class="status-label">Ghoib</span>
              </label>
              <label class="status-option">
                <input type="radio" name="status_${k.id}" value="Sakit">
                <span class="status-label">Sakit</span>
              </label>
              <label class="status-option">
                <input type="radio" name="status_${k.id}" value="Izin">
                <span class="status-label">Izin</span>
              </label>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function handleAbsen() {
      if (dbKaryawan.length === 0) {
        showToast('Tidak ada data karyawan untuk disimpan.', 'error');
        return;
      }

      // Collect data
      const records = [];
      const waktu = new Date().toISOString();

      dbKaryawan.forEach(k => {
        const selectedStatus = document.querySelector(`input[name="status_${k.id}"]:checked`).value;
        records.push({
          idKaryawan: k.id,
          nama: k.nama,
          bagian: k.bagian,
          status: selectedStatus,
          waktu: waktu
        });
      });

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.classList.add('loading');
      document.getElementById('btnText').textContent = 'Menyimpan...';

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'absen_bulk',
          records: records
        })
      })
        .then(r => r.json())
        .then(res => {
          btn.classList.remove('loading');
          if (res.result === 'success') {
            showToast('Rekap absen pagi berhasil disimpan!', 'success');
            document.getElementById('btnText').textContent = '✓ Berhasil Disimpan';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
              btn.style.background = 'var(--primary)';
              document.getElementById('btnText').textContent = 'Simpan Rekap Absen';
              btn.disabled = false;
            }, 3000);
          } else {
            btn.disabled = false;
            document.getElementById('btnText').textContent = 'Coba Lagi';
            showToast(res.message || 'Gagal menyimpan rekap absen.', 'error');
          }
        })
        .catch(e => {
          btn.disabled = false;
          btn.classList.remove('loading');
          document.getElementById('btnText').textContent = 'Simpan Rekap Absen';
          showToast('Koneksi terputus. Silakan coba lagi.', 'error');
        });
    }

    init();
  </script>
</body>

</html>
